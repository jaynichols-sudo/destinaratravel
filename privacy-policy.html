  <h1>Privacy Policy</h1>
  <p>Last updated: February 19, 2026</p>
</div>

<main id="main">
  <div class="content">
    <p>Destinara Travel ("we," "our," or "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you visit our website at destinaratravel.com or contact us about our travel services. Please read this policy carefully. If you disagree with its terms, please discontinue use of our site.</p>

    <h2>Information We Collect</h2>
    <p>We may collect the following types of personal information when you interact with our website or services:</p>
    <ul>
      <li><strong>Contact Information:</strong> Your name, email address, phone number, and mailing address when you submit our contact form or request a quote.</li>
      <li><strong>Travel Preferences:</strong> Your trip type preferences, budget range, destination interests, and travel dates that you provide when inquiring about travel services.</li>
      <li><strong>Newsletter Subscriptions:</strong> Your email address when you subscribe to our newsletter or travel updates.</li>
      <li><strong>Usage Data:</strong> Information about how you interact with our website, including pages visited, time spent on pages, and browser type, collected through Cloudflare Analytics.</li>
    </ul>

    <h2>How We Use Your Information</h2>
    <p>We use the information we collect to:</p>
    <ul>
      <li>Respond to your travel inquiries and provide personalized travel planning services</li>
      <li>Send you the travel information, quotes, and itineraries you request</li>
      <li>Send periodic newsletters and promotional communications (with your consent)</li>
      <li>Improve our website and customer experience</li>
      <li>Comply with legal obligations</li>
    </ul>
    <p>We do not sell, trade, or rent your personal information to third parties for their marketing purposes.</p>

    <h2>How We Share Your Information</h2>
    <p>We may share your information with trusted third parties only as necessary to provide our services:</p>
    <ul>
      <li><strong>Travel Suppliers:</strong> Cruise lines, hotels, tour operators, and other travel vendors when booking your trip (with your explicit consent).</li>
      <li><strong>FormSubmit:</strong> Our contact form processor, which routes your form submissions to our email inbox. No data is stored by FormSubmit beyond the submission itself.</li>
      <li><strong>Faye Travel Insurance:</strong> If you choose to explore travel insurance through our Faye partnership, you will be directed to Faye's website, which has its own privacy policy.</li>
      <li><strong>Cloudflare:</strong> We use Cloudflare for website hosting, security, and analytics. Cloudflare may collect anonymized usage data.</li>
      <li><strong>Widgety:</strong> Our cruise and tour search widget is provided by Widgety (widgety.co.uk). Search interactions may be processed by Widgety's systems.</li>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
});
const ham = document.getElementById('hamburger');
const mob = document.getElementById('mobileMenu');
ham && ham.addEventListener('click', () => {
  const open = mob.classList.toggle('open');
  ham.setAttribute('aria-expanded', open);
});
function closeMobile() { mob && mob.classList.remove('open'); ham && ham.setAttribute('aria-expanded','false'); }
document.addEventListener('click', e => {
  if (ham && !ham.contains(e.target) && mob && !mob.contains(e.target)) closeMobile();
});
// Subtle hero parallax
const heroBg = document.querySelector('.hero-bg');
window.addEventListener('scroll', () => {
  if (heroBg) heroBg.style.transform = 'scale(1.05) translateY(' + (window.scrollY * .08) + 'px)';
}, {passive: true});
</script>

<script>
// Mobile dropdown toggle
document.addEventListener('DOMContentLoaded',function(){
  var trigger = document.querySelector('.nav-dropdown-trigger');
  if(trigger){
    trigger.addEventListener('click',function(e){
      var isMobile = window.innerWidth <= 768;
      if(isMobile){
        e.preventDefault();
        var item = trigger.closest('.nav-dropdown-item');
        item.classList.toggle('open');
      }
    });
  }
});
</script>
<script id="dropdown-js">document.addEventListener("DOMContentLoaded",function(){var t=document.querySelector(".nav-dropdown-trigger");if(t){t.addEventListener("click",function(e){if(window.innerWidth<=768){e.preventDefault();t.closest(".nav-dropdown-item").classList.toggle("open");}});}});</script>
